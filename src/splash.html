<!DOCTYPE html>
<html>
<head>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; display:flex; align-items:center; justify-content:center; height:100vh; font-family:-apple-system,sans-serif; }
.box { background:#0a0a0f; border:1px solid #2a2a3a; border-radius:16px; padding:40px; text-align:center; width:320px; }
.logo { font-size:22px; font-weight:800; color:#00e5ff; margin-bottom:4px; }
.sub  { font-size:11px; color:#666680; margin-bottom:6px; }
.ver  { font-size:10px; color:#3a3a55; margin-bottom:24px; }
.bar  { width:100%; height:3px; background:#1a1a24; border-radius:2px; overflow:hidden; }
.fill { height:100%; background:linear-gradient(90deg,#00e5ff,#00b4cc); animation:load 2s ease forwards; }
@keyframes load { from{width:0} to{width:100%} }
</style>
</head>
<body>
<div class="box">
  <div class="logo">⚡ Fence Breaker</div>
  <div class="sub">Real-time stream delay control</div>
  <div class="ver">v6.0.0 — multi-platform</div>
  <div class="bar"><div class="fill"></div></div>
</div>
</body>
</html>
