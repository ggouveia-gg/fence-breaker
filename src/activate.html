<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activate Fence Breaker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222f;
  --border:#2a2a3a;--accent:#00e5ff;--accent2:#00b4cc;
  --text:#e8e8f0;--muted:#666680;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:28px;gap:0;user-select:none;
  -webkit-app-region:drag;
}
.titlebar{
  position:fixed;top:0;left:0;right:0;height:32px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;background:var(--bg2);border-bottom:1px solid var(--border);
  -webkit-app-region:drag;
}
.tb-logo{font-size:12px;font-weight:700;color:var(--accent);}
.tb-close{
  width:24px;height:24px;border:none;background:transparent;
  color:var(--muted);cursor:pointer;border-radius:4px;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  -webkit-app-region:no-drag;
}
.tb-close:hover{background:#ef4444;color:#fff;}
.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:28px 28px 24px;width:100%;max-width:400px;
  display:flex;flex-direction:column;gap:18px;
  -webkit-app-region:no-drag;margin-top:32px;
}
.logo{text-align:center;}
.logo-title{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:-.5px;}
.logo-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.trial-badge{
  text-align:center;padding:8px 0;
  background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);
  border-radius:8px;font-size:12px;color:var(--accent);
}
.trial-badge span{font-weight:700;}
.section-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;}
.key-inp{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:11px 14px;color:var(--text);
  font-size:12px;font-family:monospace;outline:none;
  transition:.15s;letter-spacing:.03em;
}
.key-inp:focus{border-color:var(--accent);}
.key-inp::placeholder{color:var(--muted);font-family:-apple-system,sans-serif;letter-spacing:0;}
.btn-activate{
  width:100%;padding:12px;border-radius:8px;border:none;
  background:var(--accent);color:#000;font-size:13px;font-weight:700;
  cursor:pointer;transition:.15s;
}
.btn-activate:hover{background:var(--accent2);}
.btn-activate:disabled{opacity:.5;cursor:default;}
.btn-trial{
  width:100%;padding:10px;border-radius:8px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;
  transition:.15s;
}
.btn-trial:hover{border-color:var(--green);color:var(--green);}
.divider{
  display:flex;align-items:center;gap:10px;
  color:var(--muted);font-size:11px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.error-msg{
  font-size:11px;color:var(--red);text-align:center;
  padding:8px;background:rgba(239,68,68,.08);
  border:1px solid rgba(239,68,68,.2);border-radius:6px;
  display:none;
}
.error-msg.show{display:block;}
.buy-link{
  text-align:center;font-size:11px;color:var(--muted);
}
.buy-link a{color:var(--accent);text-decoration:none;font-weight:600;}
.buy-link a:hover{color:var(--accent2);}
.loading{display:none;text-align:center;font-size:12px;color:var(--muted);}
.loading.show{display:block;}
/* Expired mode */
.expired-badge{
  text-align:center;padding:8px 0;
  background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;font-size:12px;color:var(--red);
}
</style>
</head>
<body>

<div class="titlebar">
  <div class="tb-logo">⚡ Fence Breaker</div>
  <button class="tb-close" onclick="window.api?.windowClose()">✕</button>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-title">⚡ Fence Breaker Pro</div>
    <div class="logo-sub">Stream delay — never cut your live</div>
  </div>

  <!-- Trial badge (shown when trial still active) -->
  <div class="trial-badge" id="trial-badge" style="display:none">
    <span id="trial-days">7</span> days left in your free trial
  </div>

  <!-- Expired badge (shown when trial expired) -->
  <div class="expired-badge" id="expired-badge" style="display:none">
    Your trial has ended — activate to continue
  </div>

  <div>
    <span class="section-label">License key</span>
    <input class="key-inp" id="key-inp" type="text"
           placeholder="Paste your license key here"
           onkeydown="if(event.key==='Enter')doActivate()">
  </div>

  <div class="error-msg" id="err-msg"></div>
  <div class="loading" id="loading">Validating license…</div>

  <button class="btn-activate" id="btn-activate" onclick="doActivate()">Activate</button>

  <!-- Trial button only shown when trial available -->
  <div id="trial-section">
    <div class="divider">or</div>
    <button class="btn-trial" id="btn-trial" onclick="doTrial()">Start 7-day free trial</button>
  </div>

  <div class="buy-link">
    Don't have a license? <a href="#" onclick="doBuy()">Buy Fence Breaker Pro →</a>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', async () => {
  const status = await window.api?.getLicenseStatus();
  if (!status) return;

  if (status.trialExpired) {
    document.getElementById('expired-badge').style.display = 'block';
    document.getElementById('trial-section').style.display = 'none';
  } else if (status.daysLeft > 0) {
    document.getElementById('trial-badge').style.display = 'block';
    document.getElementById('trial-days').textContent = status.daysLeft;
    // If trial already started, hide the start trial button
    document.getElementById('btn-trial').textContent = `Continue trial (${status.daysLeft}d left)`;
    document.getElementById('btn-trial').onclick = doTrial;
  }
});

async function doActivate() {
  const key = document.getElementById('key-inp').value.trim();
  if (!key) { showError('Please paste your license key.'); return; }

  setLoading(true);
  const res = await window.api?.activateLicense(key);
  setLoading(false);

  if (res?.ok) {
    window.api?.activationDone();
  } else {
    showError(res?.error || 'Activation failed.');
  }
}

function doTrial() {
  window.api?.startTrial();
}

function doBuy() {
  window.api?.openBuyPage();
}

function showError(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(on) {
  document.getElementById('btn-activate').disabled = on;
  document.getElementById('loading').classList.toggle('show', on);
  document.getElementById('err-msg').classList.remove('show');
}
</script>
</body>
</html>
